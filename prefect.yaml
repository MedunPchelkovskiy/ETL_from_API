prefect-version: "3.*"
name: etl_from_api

deployments:
  - name: Orchestrator-Deployment
    description: Local Prefect deployment for orchestrator flow
    entrypoint: src/flows/master/orchestrator_flow.py:orchestrator_flow
    schedule: # optional, can remove if you want manual runs
      cron: "11 * * * *"
      timezone: Europe/Sofia
    work_pool:
      name: local-dev-process


  - name: bronze-flow
    description: Local Prefect deployment for bronze layer
    entrypoint: src/flows/bronze/extract_data_for_ski_resorts_in_Bulgaria_flow.py:weather_flow_run
    tags: [local, portfolio]
    parameters:
      debug: true
    concurrency_limit: 1
    work_pool:
      name: local-dev-process


  - name: silver-flow
    description: Local Prefect deployment for silver layer
    entrypoint: src/flows/silver/extract_bronze_data_flow.py:transform_bronze_data
    tags: [ local, portfolio ]
    parameters:
      debug: true
    concurrency_limit: 1
    work_pool:
      name: local-dev-process


  - name: gold-flow
    description: Local Prefect deployment for gold forecast layer
    entrypoint: src/flows/gold/daily_dataset_forecast.py:daily_forecast
    tags: [ local, portfolio ]
    parameters:
      debug: true
    concurrency_limit: 1
    work_pool:
      name: local-dev-process

  - name: gold-daily-summ-flow
    description: Local Prefect deployment for gold daily summarized forecast flow
    entrypoint: src/flows/gold/daily_summ_agg_data.py:hourly_to_daily_aggregation
    schedule:
      cron: "5 0 * * *"
      timezone: UTC
    tags: [ local, portfolio ]
    work_pool:
      name: local-dev-process



  - name: gold-weekly-summ-flow
    description: Local Prefect deployment for gold weekly summarized forecast flow
    entrypoint: src/flows/gold/weekly_summ_agg_data.py:daily_to_weekly_aggregation
    schedule:
      cron: "5 0 * * 1"
      timezone: UTC
    tags: [ local, portfolio ]
    work_pool:
      name: local-dev-process

